services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    # image: bill-py-streamlit-web:v1.1.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # 单独挂载凭据文件，使其持久化且不打进镜像
      - ./users.json:/app/users.json
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      # - MONGO_DB_NAME=bill_tracker_test
      - MONGO_DB_NAME=bill_tracker
    depends_on:
      - mongo
    restart: always
    command: sh -c "streamlit run app.py --server.address 0.0.0.0 --server.port 8501 --browser.gatherUsageStats=false"
    networks:
      - streamlit-net

  # 定时将 MongoDB 账单同步备份到 ./data（默认每 24 小时，启动时先执行一次）
  backup:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - MONGO_DB_NAME=bill_tracker
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      # 86400=每天一次；3600=每小时（测试用）
      - BACKUP_INTERVAL_SECONDS=86400
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - mongo
    restart: always
    command: sh /app/scripts/backup-loop.sh
    networks:
      - streamlit-net

  mongo:
    image: mongo:7.0
    ports:
      - "37017:27017"  # 将容器的27017端口映射到宿主机的37017端口
    volumes:
      - mongo_data_new:/data/db
    restart: always
    networks:
      - streamlit-net  # 让mongo服务也加入到同一网络

volumes:
  mongo_data_new:

networks:
  streamlit-net:
    driver: bridge
